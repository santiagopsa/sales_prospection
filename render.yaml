services:
  - type: web
    name: peaku-sandler
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: peaku-sandler-db
          property: connectionString

databases:
  - name: peaku-sandler-db
    plan: free
    databaseName: peaku_sandler
    user: peaku
